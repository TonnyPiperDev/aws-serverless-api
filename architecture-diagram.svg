<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif; background: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect x="260" y="30" width="160" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="53" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Client</text>
  <text x="340" y="71" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">HTTP request</text>

  <!-- Arrow: Client to API Gateway -->
  <line x1="340" y1="86" x2="340" y2="138" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="116" dominant-baseline="central" font-size="12" fill="#5F5E5A">HTTPS</text>

  <!-- API Gateway -->
  <rect x="160" y="138" width="360" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="161" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">API Gateway</text>
  <text x="340" y="179" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">REST API · staged deployments · throttling</text>

  <!-- Arrow: API Gateway to Lambda -->
  <line x1="340" y1="194" x2="340" y2="246" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="224" dominant-baseline="central" font-size="12" fill="#5F5E5A">invoke</text>

  <!-- Lambda -->
  <rect x="160" y="246" width="360" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="269" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">AWS Lambda</text>
  <text x="340" y="287" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Python 3.12 · execution role · env vars</text>

  <!-- Arrow: Lambda to DynamoDB -->
  <line x1="340" y1="302" x2="340" y2="354" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="332" dominant-baseline="central" font-size="12" fill="#5F5E5A">CRUD</text>

  <!-- DynamoDB -->
  <rect x="160" y="354" width="360" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="377" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">DynamoDB</text>
  <text x="340" y="395" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Users table · on-demand capacity</text>

  <!-- Observability divider -->
  <line x1="40" y1="460" x2="640" y2="460" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text x="40" y="448" dominant-baseline="central" font-size="12" fill="#888780">Observability</text>

  <!-- Arrow: Lambda to CloudWatch (left) -->
  <line x1="160" y1="274" x2="120" y2="274" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="120" y1="274" x2="120" y2="500" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="108" y="390" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">logs</text>

  <!-- CloudWatch -->
  <rect x="20" y="500" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="120" y="523" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">CloudWatch</text>
  <text x="120" y="541" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Logs · alarms · metrics</text>

  <!-- Arrow: CloudWatch to SNS -->
  <line x1="220" y1="528" x2="270" y2="528" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SNS -->
  <rect x="270" y="500" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="360" y="523" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">SNS</text>
  <text x="360" y="541" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Email alerts on alarm</text>

  <!-- Arrow: Lambda to IAM (right) -->
  <line x1="520" y1="274" x2="560" y2="274" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="274" x2="560" y2="500" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="572" y="390" dominant-baseline="central" font-size="12" fill="#5F5E5A">role</text>

  <!-- IAM -->
  <rect x="460" y="500" width="200" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="560" y="523" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">IAM</text>
  <text x="560" y="541" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">Execution role · least privilege</text>
</svg>
